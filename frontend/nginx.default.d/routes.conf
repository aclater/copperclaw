# Lazy DNS resolution — required for container names in Podman networks
resolver 10.89.0.1 valid=10s ipv6=off;

# SPA fallback — serve index.html for all non-file routes
location / {
    try_files $uri $uri/ /index.html;
}

# Operator service
location /api/operator/ {
    set $upstream_operator http://operator-service:8000;
    proxy_pass $upstream_operator/api/operator/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
}

# SSE stream from sse-bridge-service
location /api/stream {
    set $upstream_sse http://sse-bridge-service:8090;
    proxy_pass $upstream_sse/api/stream;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header Cache-Control 'no-cache';
    proxy_set_header X-Accel-Buffering 'no';
    proxy_buffering off;
    chunked_transfer_encoding on;
    proxy_read_timeout 3600s;
}

# State service
location /api/state/ {
    set $upstream_state http://state-service:8089;
    proxy_pass $upstream_state/api/state/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
