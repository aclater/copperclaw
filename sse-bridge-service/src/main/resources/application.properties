quarkus.application.name=sse-bridge-service
quarkus.http.port=8090

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Incoming: cycle-state events
mp.messaging.incoming.cycle-state-in.connector=smallrye-kafka
mp.messaging.incoming.cycle-state-in.topic=copperclaw.cycle-state
mp.messaging.incoming.cycle-state-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.cycle-state-in.group.id=sse-bridge-service-group

# Incoming: commander log
mp.messaging.incoming.commander-log-in.connector=smallrye-kafka
mp.messaging.incoming.commander-log-in.topic=copperclaw.commander-log
mp.messaging.incoming.commander-log-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.commander-log-in.group.id=sse-bridge-service-group

# CORS — allow frontend dev server
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Micrometer + Prometheus metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Dev Services — auto-starts Kafka and PostgreSQL in dev mode only
%dev.quarkus.kafka.devservices.enabled=true
%dev.quarkus.datasource.devservices.enabled=true
