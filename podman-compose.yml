version: "3.8"

networks:
  copperclaw:
    driver: bridge

volumes:
  ramalama-models:

services:
  zookeeper:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    command: ["sh", "-c", "bin/zookeeper-server-start.sh config/zookeeper.properties"]
    ports: ["2181:2181"]
    networks: [copperclaw]
    tmpfs:
      - /opt/kafka/logs

  kafka:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    command:
      - sh
      - -c
      - |
        bin/kafka-server-start.sh config/server.properties \
          --override listeners=PLAINTEXT://:9092 \
          --override advertised.listeners=PLAINTEXT://kafka:9092 \
          --override zookeeper.connect=zookeeper:2181 \
          --override auto.create.topics.enable=false
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    networks: [copperclaw]
    tmpfs:
      - /opt/kafka/logs

  kafka-setup:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    depends_on: [kafka]
    networks: [copperclaw]
    tmpfs:
      - /opt/kafka/logs
    command:
      - sh
      - -c
      - |
        until bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          echo 'Waiting for Kafka...'; sleep 2;
        done
        for topic in copperclaw.operator-commands copperclaw.isr-tasking copperclaw.collection copperclaw.assessment copperclaw.nomination copperclaw.legal-review copperclaw.authorization copperclaw.execution copperclaw.bda copperclaw.develop copperclaw.cycle-state copperclaw.commander-log copperclaw.cot-in copperclaw.cot-out; do
          bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1
        done
        echo 'All 14 topics created.'
    restart: "no"

  postgres:
    image: docker.io/postgres:15
    networks: [copperclaw]
    environment:
      POSTGRES_USER: copperclaw
      POSTGRES_PASSWORD: copperclaw
      POSTGRES_DB: copperclaw
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copperclaw -d copperclaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  ramalama:
    image: quay.io/ramalama/ramalama:latest
    ports: ["8080:8080"]
    volumes:
      - ramalama-models:/root/.local/share/ramalama
      - /etc/cdi:/etc/cdi:ro
    networks: [copperclaw]
    # NVIDIA CUDA (current) — uses CDI device "nvidia.com/gpu=0":
    devices:
      - "nvidia.com/gpu=0"
    # AMD ROCm (future — replace devices block above with):
    #   devices:
    #     - /dev/kfd:/dev/kfd
    #     - /dev/dri:/dev/dri
    command:
      - sh
      - -c
      - RAMALAMA_TRANSPORT=ollama ramalama serve qwen2.5:14b --port 8080 --host 0.0.0.0

  isr-tasking-service:
    build: agents/isr-tasking-service
    ports: ["8081:8081"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  collection-service:
    build: agents/collection-service
    ports: ["8082:8082"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  allsource-analyst-service:
    build: agents/allsource-analyst-service
    ports: ["8083:8083"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  target-nomination-service:
    build: agents/target-nomination-service
    ports: ["8084:8084"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  legal-review-service:
    build: agents/legal-review-service
    ports: ["8091:8091"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  commander-service:
    build: agents/commander-service
    ports: ["8085:8085"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  execution-service:
    build: agents/execution-service
    ports: ["8086:8086"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  bda-service:
    build: agents/bda-service
    ports: ["8087:8087"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  develop-service:
    build: agents/develop-service
    ports: ["8088:8088"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  cot-gateway-service:
    build: agents/cot-gateway-service
    ports: ["8092:8092"]
    depends_on: [kafka-setup]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      COT_SIMULATION_MODE: ${COT_SIMULATION_MODE:-true}
      COT_SIMULATION_INTERVAL_SECONDS: ${COT_SIMULATION_INTERVAL_SECONDS:-30}

  state-service:
    build: state-service
    ports: ["8089:8089"]
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks: [copperclaw]
    restart: on-failure
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: postgres
      DB_USER: copperclaw
      DB_PASSWORD: copperclaw
      DB_NAME: copperclaw

  sse-bridge-service:
    build: sse-bridge-service
    ports: ["8090:8090"]
    depends_on: [kafka-setup]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  operator-service:
    build: operator-service
    ports: ["8000:8000"]
    depends_on: [kafka-setup, state-service, sse-bridge-service, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STATE_SERVICE_URL: http://state-service:8089
      SSE_BRIDGE_URL: http://sse-bridge-service:8090

  frontend:
    build: frontend
    ports: ["3000:3000"]
    depends_on: [operator-service, sse-bridge-service]
    networks: [copperclaw]
    environment:
      VITE_OPERATOR_URL: http://operator-service:8000
      VITE_SSE_URL: http://sse-bridge-service:8090
