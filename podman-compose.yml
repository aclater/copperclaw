version: "3.8"

networks:
  copperclaw:
    driver: bridge

volumes:
  ramalama-models:

services:
  zookeeper:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    command: ["sh", "-c", "bin/zookeeper-server-start.sh config/zookeeper.properties"]
    ports: ["2181:2181"]
    networks:
      copperclaw:
        aliases: [zookeeper]
    tmpfs:
      - /opt/kafka/logs
    environment:
      # Disable GC file logging — /opt/kafka/logs is root-owned in the image;
      # rootless Podman containers can't write there even with tmpfs.
      # GC events still appear on stdout.
      KAFKA_GC_LOG_OPTS: ""
    labels:
      io.copperclaw.service: zookeeper
      io.copperclaw.component: infrastructure
      org.opencontainers.image.title: zookeeper
      org.opencontainers.image.version: "1.0.0"

  kafka:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    command:
      - sh
      - -c
      - |
        bin/kafka-server-start.sh config/server.properties \
          --override listeners=PLAINTEXT://:9092 \
          --override advertised.listeners=PLAINTEXT://kafka:9092 \
          --override zookeeper.connect=zookeeper:2181 \
          --override auto.create.topics.enable=false
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    networks:
      copperclaw:
        aliases: [kafka]
    tmpfs:
      - /opt/kafka/logs
    environment:
      KAFKA_GC_LOG_OPTS: ""
    labels:
      io.copperclaw.service: kafka
      io.copperclaw.component: infrastructure
      org.opencontainers.image.title: kafka
      org.opencontainers.image.version: "1.0.0"

  kafka-setup:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    depends_on: [kafka]
    networks:
      copperclaw:
        aliases: [kafka-setup]
    tmpfs:
      - /opt/kafka/logs
    environment:
      KAFKA_GC_LOG_OPTS: ""
    command:
      - sh
      - -c
      - |
        until bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          echo 'Waiting for Kafka...'; sleep 2;
        done
        for topic in copperclaw.operator-commands copperclaw.isr-tasking copperclaw.collection copperclaw.assessment copperclaw.nomination copperclaw.legal-review copperclaw.authorization copperclaw.execution copperclaw.bda copperclaw.develop copperclaw.cycle-state copperclaw.commander-log copperclaw.cot-in copperclaw.cot-out; do
          bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1
        done
        echo 'All 14 topics created.'
    restart: "no"
    labels:
      io.copperclaw.service: kafka-setup
      io.copperclaw.component: infrastructure
      org.opencontainers.image.title: kafka-setup
      org.opencontainers.image.version: "1.0.0"

  postgres:
    image: docker.io/postgres:15
    networks:
      copperclaw:
        aliases: [postgres]
    environment:
      POSTGRES_USER: copperclaw
      POSTGRES_PASSWORD: copperclaw
      POSTGRES_DB: copperclaw
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copperclaw -d copperclaw"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      io.copperclaw.service: postgres
      io.copperclaw.component: infrastructure
      org.opencontainers.image.title: postgres
      org.opencontainers.image.version: "1.0.0"

  ramalama:
    image: quay.io/ramalama/ramalama:latest
    ports: ["8080:8080"]
    volumes:
      - ramalama-models:/root/.local/share/ramalama
      - /etc/cdi:/etc/cdi:ro
    networks:
      copperclaw:
        aliases: [ramalama]
    devices:
      - nvidia.com/gpu=all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CUDA_VISIBLE_DEVICES: "0"
    command:
      - sh
      - -c
      - "ramalama serve ollama://qwen2.5:14b --port 8080 --host 0.0.0.0"
    labels:
      io.copperclaw.service: ramalama
      io.copperclaw.component: infrastructure
      org.opencontainers.image.title: ramalama
      org.opencontainers.image.version: "1.0.0"

  ramalama-pull:
    image: quay.io/ramalama/ramalama:latest
    depends_on: [ramalama]
    networks:
      copperclaw:
        aliases: [ramalama-pull]
    volumes:
      - ramalama-models:/root/.local/share/ramalama
      - /etc/cdi:/etc/cdi:ro
    devices:
      - nvidia.com/gpu=all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - sh
      - -c
      - "sleep 8 && ramalama pull ollama://qwen2.5:14b"
    restart: "no"
    labels:
      io.copperclaw.service: ramalama-pull
      io.copperclaw.component: infrastructure
      org.opencontainers.image.title: ramalama-pull
      org.opencontainers.image.version: "1.0.0"

  isr-tasking-service:
    build: agents/isr-tasking-service
    ports: ["8081:8081"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: isr-tasking-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: isr-tasking-service
      org.opencontainers.image.version: "1.0.0"

  collection-service:
    build: agents/collection-service
    ports: ["8082:8082"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: collection-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: collection-service
      org.opencontainers.image.version: "1.0.0"

  allsource-analyst-service:
    build: agents/allsource-analyst-service
    ports: ["8083:8083"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: allsource-analyst-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: allsource-analyst-service
      org.opencontainers.image.version: "1.0.0"

  target-nomination-service:
    build: agents/target-nomination-service
    ports: ["8084:8084"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: target-nomination-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: target-nomination-service
      org.opencontainers.image.version: "1.0.0"

  legal-review-service:
    build: agents/legal-review-service
    ports: ["8091:8091"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: legal-review-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: legal-review-service
      org.opencontainers.image.version: "1.0.0"

  commander-service:
    build: agents/commander-service
    ports: ["8085:8085"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: commander-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: commander-service
      org.opencontainers.image.version: "1.0.0"

  execution-service:
    build: agents/execution-service
    ports: ["8086:8086"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: execution-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: execution-service
      org.opencontainers.image.version: "1.0.0"

  bda-service:
    build: agents/bda-service
    ports: ["8087:8087"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: bda-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: bda-service
      org.opencontainers.image.version: "1.0.0"

  develop-service:
    build: agents/develop-service
    ports: ["8088:8088"]
    depends_on: [kafka-setup, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    labels:
      io.copperclaw.service: develop-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: develop-service
      org.opencontainers.image.version: "1.0.0"

  cot-gateway-service:
    build: agents/cot-gateway-service
    ports: ["8092:8092"]
    depends_on: [kafka-setup]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      COT_SIMULATION_MODE: ${COT_SIMULATION_MODE:-true}
      COT_SIMULATION_INTERVAL_SECONDS: ${COT_SIMULATION_INTERVAL_SECONDS:-30}
    labels:
      io.copperclaw.service: cot-gateway-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: cot-gateway-service
      org.opencontainers.image.version: "1.0.0"

  state-service:
    build: state-service
    ports: ["8089:8089"]
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks: [copperclaw]
    restart: on-failure
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: postgres
      DB_USER: copperclaw
      DB_PASSWORD: copperclaw
      DB_NAME: copperclaw
    labels:
      io.copperclaw.service: state-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: state-service
      org.opencontainers.image.version: "1.0.0"

  sse-bridge-service:
    build: sse-bridge-service
    ports: ["8090:8090"]
    depends_on: [kafka-setup]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    labels:
      io.copperclaw.service: sse-bridge-service
      io.copperclaw.component: f3ead-agent
      org.opencontainers.image.title: sse-bridge-service
      org.opencontainers.image.version: "1.0.0"

  operator-service:
    build: operator-service
    ports: ["8000:8000"]
    depends_on: [kafka-setup, state-service, sse-bridge-service, ramalama]
    networks: [copperclaw]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_BACKEND: ${LLM_BACKEND:-ramalama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      RAMALAMA_BASE_URL: http://ramalama:8080/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STATE_SERVICE_URL: http://state-service:8089
      SSE_BRIDGE_URL: http://sse-bridge-service:8090
    labels:
      io.copperclaw.service: operator-service
      io.copperclaw.component: operator
      org.opencontainers.image.title: operator-service
      org.opencontainers.image.version: "1.0.0"

  frontend:
    build: frontend
    ports: ["3000:8080"]
    depends_on: [operator-service, sse-bridge-service]
    networks: [copperclaw]
    environment:
      VITE_OPERATOR_URL: http://operator-service:8000
      VITE_SSE_URL: http://sse-bridge-service:8090
    labels:
      io.copperclaw.service: frontend
      io.copperclaw.component: frontend
      org.opencontainers.image.title: frontend
      org.opencontainers.image.version: "1.0.0"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    ports: ["8180:8080"]
    networks: [copperclaw]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: copperclaw
      KC_DB: dev-mem
    command: start-dev
    profiles: [auth]
    labels:
      io.copperclaw.service: keycloak
      io.copperclaw.component: identity
      org.opencontainers.image.title: keycloak
      org.opencontainers.image.version: "1.0.0"

  prometheus:
    image: quay.io/prometheus/prometheus:latest
    ports: ["9090:9090"]
    networks: [copperclaw]
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles: [observability]
    labels:
      io.copperclaw.service: prometheus
      io.copperclaw.component: observability
      org.opencontainers.image.title: prometheus
      org.opencontainers.image.version: "1.0.0"

  grafana:
    image: docker.io/grafana/grafana:latest
    ports: ["3001:3000"]
    networks: [copperclaw]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: copperclaw
    profiles: [observability]
    labels:
      io.copperclaw.service: grafana
      io.copperclaw.component: observability
      org.opencontainers.image.title: grafana
      org.opencontainers.image.version: "1.0.0"
