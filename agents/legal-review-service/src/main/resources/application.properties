quarkus.application.name=legal-review-service
quarkus.http.port=8091

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Input: TNP from target-nomination-service
mp.messaging.incoming.nomination-in.connector=smallrye-kafka
mp.messaging.incoming.nomination-in.topic=copperclaw.nomination
mp.messaging.incoming.nomination-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.nomination-in.group.id=legal-review-service-nomination-group

# Output: legal review assessment to commander-service
mp.messaging.outgoing.legal-review-out.connector=smallrye-kafka
mp.messaging.outgoing.legal-review-out.topic=copperclaw.legal-review
mp.messaging.outgoing.legal-review-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Output: cycle state updates
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LangChain4j / Anthropic
langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.max-tokens=4096

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/legal-review-service/system-prompt.md}
