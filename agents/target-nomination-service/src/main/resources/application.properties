quarkus.application.name=target-nomination-service
quarkus.http.port=8084

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.assessment-in.connector=smallrye-kafka
mp.messaging.incoming.assessment-in.topic=copperclaw.assessment
mp.messaging.incoming.assessment-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.assessment-in.group.id=target-nomination-service-group
mp.messaging.outgoing.nomination-out.connector=smallrye-kafka
mp.messaging.outgoing.nomination-out.topic=copperclaw.nomination
mp.messaging.outgoing.nomination-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LLM backend — RamaLama by default
llm.backend=${LLM_BACKEND:ramalama}
llm.model=${LLM_MODEL:qwen2.5:14b}
ramalama.base-url=${RAMALAMA_BASE_URL:http://localhost:8080/v1}
anthropic.api-key=${ANTHROPIC_API_KEY:}

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/target-nomination-service/system-prompt.md}
