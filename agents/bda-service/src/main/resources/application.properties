quarkus.application.name=bda-service
quarkus.http.port=8087

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.execution-in.connector=smallrye-kafka
mp.messaging.incoming.execution-in.topic=copperclaw.execution
mp.messaging.incoming.execution-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.execution-in.group.id=bda-service-group
mp.messaging.outgoing.bda-out.connector=smallrye-kafka
mp.messaging.outgoing.bda-out.topic=copperclaw.bda
mp.messaging.outgoing.bda-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LLM backend — RamaLama by default
llm.backend=${LLM_BACKEND:ramalama}
llm.model=${LLM_MODEL:qwen2.5:14b}
ramalama.base-url=${RAMALAMA_BASE_URL:http://localhost:8080/v1}
anthropic.api-key=${ANTHROPIC_API_KEY:}

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/bda-service/system-prompt.md}

# Micrometer + Prometheus metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Dev Services — auto-starts Kafka and PostgreSQL in dev mode only
%dev.quarkus.kafka.devservices.enabled=true
%dev.quarkus.datasource.devservices.enabled=true
