quarkus.application.name=allsource-analyst-service
quarkus.http.port=8083

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.collection-in.connector=smallrye-kafka
mp.messaging.incoming.collection-in.topic=copperclaw.collection
mp.messaging.incoming.collection-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.collection-in.group.id=allsource-analyst-service-group
mp.messaging.outgoing.assessment-out.connector=smallrye-kafka
mp.messaging.outgoing.assessment-out.topic=copperclaw.assessment
mp.messaging.outgoing.assessment-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LangChain4j / Anthropic
langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.max-tokens=4096

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/allsource-analyst-service/system-prompt.md}
