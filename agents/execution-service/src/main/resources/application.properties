quarkus.application.name=execution-service
quarkus.http.port=8086

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.authorization-in.connector=smallrye-kafka
mp.messaging.incoming.authorization-in.topic=copperclaw.authorization
mp.messaging.incoming.authorization-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.authorization-in.group.id=execution-service-group
mp.messaging.outgoing.execution-out.connector=smallrye-kafka
mp.messaging.outgoing.execution-out.topic=copperclaw.execution
mp.messaging.outgoing.execution-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LLM backend — RamaLama by default
llm.backend=${LLM_BACKEND:ramalama}
llm.model=${LLM_MODEL:qwen2.5:14b}
ramalama.base-url=${RAMALAMA_BASE_URL:http://localhost:8080/v1}
anthropic.api-key=${ANTHROPIC_API_KEY:}

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/execution-service/system-prompt.md}
