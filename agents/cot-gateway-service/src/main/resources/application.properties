quarkus.application.name=cot-gateway-service
quarkus.http.port=8092

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Output: raw CoT JSON to Kafka
mp.messaging.outgoing.cot-out.connector=smallrye-kafka
mp.messaging.outgoing.cot-out.topic=copperclaw.cot-out
mp.messaging.outgoing.cot-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# CoT multicast
copperclaw.cot.multicast.group=239.2.3.1
copperclaw.cot.multicast.port=6969

# Simulation mode — set COT_SIMULATION_MODE=false to use real UDP multicast
copperclaw.cot.simulation.enabled=${COT_SIMULATION_MODE:true}
copperclaw.cot.simulation.interval-seconds=${COT_SIMULATION_INTERVAL_SECONDS:30}
