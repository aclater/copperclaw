quarkus.application.name=develop-service
quarkus.http.port=8088

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.bda-in-develop.connector=smallrye-kafka
mp.messaging.incoming.bda-in-develop.topic=copperclaw.bda
mp.messaging.incoming.bda-in-develop.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.bda-in-develop.group.id=develop-service-group
mp.messaging.outgoing.develop-out.connector=smallrye-kafka
mp.messaging.outgoing.develop-out.topic=copperclaw.develop
mp.messaging.outgoing.develop-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LangChain4j / Anthropic
langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.max-tokens=4096

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/develop-service/system-prompt.md}
