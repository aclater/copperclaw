quarkus.application.name=commander-service
quarkus.http.port=8085

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Input: LegalReviewAssessment from legal-review-service
mp.messaging.incoming.legal-review-in.connector=smallrye-kafka
mp.messaging.incoming.legal-review-in.topic=copperclaw.legal-review
mp.messaging.incoming.legal-review-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.legal-review-in.group.id=commander-service-legal-review-group

# Input: operator commands (authorize/hold)
mp.messaging.incoming.operator-commands-in.connector=smallrye-kafka
mp.messaging.incoming.operator-commands-in.topic=copperclaw.operator-commands
mp.messaging.incoming.operator-commands-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.operator-commands-in.group.id=commander-service-operator-group

# Output: engagement authorization
mp.messaging.outgoing.authorization-out.connector=smallrye-kafka
mp.messaging.outgoing.authorization-out.topic=copperclaw.authorization
mp.messaging.outgoing.authorization-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Output: cycle state
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LangChain4j / Anthropic
langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.max-tokens=4096

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/commander-service/system-prompt.md}
