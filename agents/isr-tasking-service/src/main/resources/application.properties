quarkus.application.name=isr-tasking-service
quarkus.http.port=8081

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.operator-commands-in.connector=smallrye-kafka
mp.messaging.incoming.operator-commands-in.topic=copperclaw.operator-commands
mp.messaging.incoming.operator-commands-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.operator-commands-in.group.id=isr-tasking-service-group
mp.messaging.outgoing.isr-tasking-out.connector=smallrye-kafka
mp.messaging.outgoing.isr-tasking-out.topic=copperclaw.isr-tasking
mp.messaging.outgoing.isr-tasking-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.develop-in.connector=smallrye-kafka
mp.messaging.incoming.develop-in.topic=copperclaw.develop
mp.messaging.incoming.develop-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.develop-in.group.id=isr-tasking-service-develop-group

# LangChain4j / Anthropic
langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.max-tokens=4096

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/isr-tasking-service/system-prompt.md}
