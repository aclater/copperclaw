quarkus.application.name=collection-service
quarkus.http.port=8082

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.isr-tasking-in.connector=smallrye-kafka
mp.messaging.incoming.isr-tasking-in.topic=copperclaw.isr-tasking
mp.messaging.incoming.isr-tasking-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.isr-tasking-in.group.id=collection-service-group
mp.messaging.outgoing.collection-out.connector=smallrye-kafka
mp.messaging.outgoing.collection-out.topic=copperclaw.collection
mp.messaging.outgoing.collection-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.cycle-state-out.connector=smallrye-kafka
mp.messaging.outgoing.cycle-state-out.topic=copperclaw.cycle-state
mp.messaging.outgoing.cycle-state-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LangChain4j / Anthropic
langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.max-tokens=4096

# System prompt
copperclaw.agent.system-prompt-path=${SYSTEM_PROMPT_PATH:agents/collection-service/system-prompt.md}
