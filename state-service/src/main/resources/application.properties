mp.messaging.incoming.execution-in.connector=smallrye-kafka
mp.messaging.incoming.execution-in.topic=copperclaw.execution
mp.messaging.incoming.execution-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.execution-in.group.id=state-service-group

mp.messaging.incoming.bda-in.connector=smallrye-kafka
mp.messaging.incoming.bda-in.topic=copperclaw.bda
mp.messaging.incoming.bda-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
