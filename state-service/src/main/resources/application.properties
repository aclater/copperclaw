mp.messaging.incoming.legal-review-in.connector=smallrye-kafka
mp.messaging.incoming.legal-review-in.topic=copperclaw.legal-review
mp.messaging.incoming.legal-review-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.legal-review-in.group.id=state-service-group

mp.messaging.incoming.cot-events-in.connector=smallrye-kafka
mp.messaging.incoming.cot-events-in.topic=copperclaw.cot-out
