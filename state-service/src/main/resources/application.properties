quarkus.application.name=state-service
quarkus.http.port=8089

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:copperclaw}
quarkus.datasource.password=${DB_PASSWORD:copperclaw}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:copperclaw}

# Kafka bootstrap
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Incoming: all agent output topics
mp.messaging.incoming.isr-tasking-in.connector=smallrye-kafka
mp.messaging.incoming.isr-tasking-in.topic=copperclaw.isr-tasking
mp.messaging.incoming.isr-tasking-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.isr-tasking-in.group.id=state-service-group

mp.messaging.incoming.collection-in.connector=smallrye-kafka
mp.messaging.incoming.collection-in.topic=copperclaw.collection
mp.messaging.incoming.collection-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.collection-in.group.id=state-service-group

mp.messaging.incoming.assessment-in.connector=smallrye-kafka
mp.messaging.incoming.assessment-in.topic=copperclaw.assessment
mp.messaging.incoming.assessment-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.assessment-in.group.id=state-service-group

mp.messaging.incoming.nomination-in.connector=smallrye-kafka
mp.messaging.incoming.nomination-in.topic=copperclaw.nomination
mp.messaging.incoming.nomination-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.nomination-in.group.id=state-service-group

mp.messaging.incoming.authorization-in.connector=smallrye-kafka
