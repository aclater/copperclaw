# logrotate config for COPPERCLAW
# Usage: logrotate -s logs/.logrotate.state scripts/logrotate.conf
#
# start.sh handles rotation on each startup (keeps 5 runs, ~50 MB each).
# This config is for scheduled rotation if the stack runs continuously.

/home/aclater/copperclaw/logs/copperclaw.log {
    size 50M
    rotate 5
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
